<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Analyser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; padding: 100px 0; }
        .search-card { margin-top: -50px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Food Nutrition Analyser</h1>
        <p class="lead">Enter a food item to check its health score and nutritional value.</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card search-card p-4">
                <form method="POST" action="{% url 'analyze' %}">
                    {% csrf_token %}
                    <div class="input-group input-group-lg">
                        <input type="text" name="food_name" class="form-control border-0" placeholder="e.g. Apple juice" required>
                        <button class="btn btn-success px-4" type="submit">Analyze</button>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger mt-3">{{ error }}</div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
